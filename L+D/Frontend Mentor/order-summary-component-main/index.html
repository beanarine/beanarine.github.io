<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->

<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    
    <title>Frontend Mentor | Order summary card</title>
    <meta name="description" content="">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution { font-size: 11px; text-align: center; }
      .attribution a { color: hsl(228, 45%, 44%); }
    </style>  
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <img class="hero" src="./images/illustration-hero.svg" alt="A long-haired White person is dancing in the city. The musical notes dance in the purple dusk as the person jams out to music coming through the headphones hooked up to their phone.">
          <section class="focus">
            <h1 class="memo text-center">
                Order Summary
            </h1>
            <section class="fanfare text-center">
                You can now listen to millions of songs, audiobooks, and podcasts on any 
                device anywhere you like!
            </section>
            <div class="line-item">
              <img src="./images/icon-music.svg" class ="line-icon">
              <div class="item">
                  <p class="quantity">Annual Plan</p>
                  <p class="rate">$59.99/year</p>
              </div>
              <a class="doer-change text-center" href="" target="_blank">
                Change
              </a>
            </div> 
            <input class="button button-proceed"
                   type="button"
                   value="Proceed to Payment">
            <input class="button button-cancel"
                   type="button"
                   value="Cancel Order">
          </section>
        </div>
    </div>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
