<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Frontend Mentor | NFT preview card component</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">

  </head>
  <body>
    <!--[if lt IE 7]>
      <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->
      <div class="card softblue-text">
        <img src="./images/image-equilibrium.jpg" alt="stupid technology" class="noodlefucker-tech">
        <div class="focus">

          <h1 class="white-text">
            Equilibrium #3429
          </h1>

          <p>
            Our Equilibrium collection promotes balance and calm.
          </p>

          <div class="bid-details row">
              
              <div class="row">
                <img src="./images/icon-ethereum.svg" class="icon">
                <h2 class="cyan-text eth-cost">
                  0.041 ETH
                </h2>
              </div>
            
              <div class="row">
                <img src="./images/icon-clock.svg" class="icon">
                <p class="time-left">
                  3 days left
                </p>
              </div>

          </div>

          <hr>

          <div class="artist-details row">

            <img src="./images/image-avatar.png" class="artist-avatar">
            <div>
              Creation of
            </div>
            <div class="white-text">
              Jules Wyvern
            </div>

          </div>

        </div>
      </div>
    <div class="attribution row white-text">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">hyfy</a>.
    </div>
    <script src="" async defer></script>
  </body>
</html>
